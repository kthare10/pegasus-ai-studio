# PegasusAI Studio — multi-user gateway, CILogon mode (vouch-proxy).
#
# Identity chain (all maps are lazy, resolved after auth_request runs):
#   X-Vouch-User (email) -> $studio_user (identity.map, written by add-user.sh
#   / the onboarding broker) -> per-user backend ports (nginx-users.map etc.)
# Unmapped-but-authenticated identities fall through to the onboarding broker
# (127.0.0.1:9095), which creates the account and redirects back.
#
# Enabled by enable-cilogon.sh (swaps the sites-enabled symlink). To roll back
# to basic auth: ln -sf /etc/nginx/sites-available/studio.conf \
#   /etc/nginx/sites-enabled/studio.conf && systemctl reload nginx

upstream studio_web { server 127.0.0.1:3000; }
upstream vouch      { server 127.0.0.1:9090; }
upstream broker     { server 127.0.0.1:9095; }

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# CILogon email -> unix account
map $auth_user $studio_user {
    default "";
    include /etc/pegasus-studio/identity.map;
}

# unix account -> per-user backends; unmapped -> onboarding broker
map $studio_user $studio_backend {
    default 127.0.0.1:9095;
    include /etc/pegasus-studio/nginx-users.map;
}
map $studio_user $jupyter_backend {
    default 127.0.0.1:9095;
    include /etc/pegasus-studio/nginx-jupyter.map;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # Paths are rewritten to the Let's Encrypt cert by enable-cilogon.sh
    ssl_certificate     /etc/pegasus-studio/ssl/fullchain.pem;
    ssl_certificate_key /etc/pegasus-studio/ssl/privkey.pem;

    client_max_body_size 100M;

    # --- Vouch: internal validation endpoint ---
    location = /validate {
        internal;
        proxy_pass http://vouch/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Vouch: login / logout / OIDC callback (no auth gate) ---
    location ~ ^/(login|logout|auth)($|/) {
        # auth_request is inherited from the server level; without this
        # opt-out, /login itself 401s and redirects to /login forever.
        auth_request off;
        proxy_pass http://vouch;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Public landing page (the only unauthenticated content)
    location = /welcome {
        auth_request off;
        default_type text/html;
        alias /opt/pegasus-studio/landing/index.html;
    }

    # Unauthenticated -> landing page; its Sign in button starts the CILogon
    # flow and returns to the originally requested URL.
    error_page 401 = @welcome;
    location @welcome {
        return 302 https://$host/welcome?url=$scheme://$http_host$request_uri;
    }

    # --- Everything below requires a vouch session ---
    auth_request /validate;
    auth_request_set $auth_user $upstream_http_x_vouch_user;

    # Shared frontend (per-user state flows via /api)
    location / {
        proxy_pass http://studio_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Per-user backend API (or broker for first-time users)
    location /api/ {
        proxy_pass http://$studio_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Auth-User $auth_user;
        proxy_set_header X-Original-URI $request_uri;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Per-user WebSocket terminals
    location /ws/ {
        proxy_pass http://$studio_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Auth-User $auth_user;
        proxy_set_header X-Original-URI $request_uri;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Per-user JupyterLab
    location /jupyter/ {
        proxy_pass http://$jupyter_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Auth-User $auth_user;
        proxy_set_header X-Original-URI $request_uri;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
