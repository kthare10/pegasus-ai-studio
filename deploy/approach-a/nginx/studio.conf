# PegasusAI Studio — multi-user gateway (Approach A, phase 1: basic auth over TLS)
#
# Routes /api and /ws to the authenticated user's own studio-api instance.
# The map file is maintained by add-user.sh; one line per user:
#   alice 127.0.0.1:9101;

upstream studio_web {
    server 127.0.0.1:3000;
}

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

map $remote_user $studio_backend {
    default "";
    include /etc/pegasus-studio/nginx-users.map;
}

map $remote_user $jupyter_backend {
    default "";
    include /etc/pegasus-studio/nginx-jupyter.map;
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # ACME http-01 challenges (Let's Encrypt) must not be redirected
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;

    # Self-signed by provision.sh; replace with Let's Encrypt certs once the
    # host has a DNS name (certbot --nginx).
    ssl_certificate     /etc/pegasus-studio/ssl/fullchain.pem;
    ssl_certificate_key /etc/pegasus-studio/ssl/privkey.pem;

    auth_basic           "PegasusAI Studio";
    auth_basic_user_file /etc/pegasus-studio/htpasswd;

    client_max_body_size 100M;

    # --- Shared frontend (Next.js, stateless) ---
    location / {
        proxy_pass http://studio_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Per-user backend API ---
    location /api/ {
        if ($studio_backend = "") { return 403 "no studio instance for this user\n"; }
        proxy_pass http://$studio_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # --- Per-user WebSocket terminals ---
    location /ws/ {
        if ($studio_backend = "") { return 403; }
        proxy_pass http://$studio_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- Per-user JupyterLab (jupyter@<user> units) ---
    location /jupyter/ {
        if ($jupyter_backend = "") { return 403; }
        proxy_pass http://$jupyter_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
