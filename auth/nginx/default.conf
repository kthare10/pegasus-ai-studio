# Authenticating front proxy for PegasusAI Studio.
# Terminates TLS, gates every request behind a valid Vouch/CILogon session,
# then proxies through to the studio container (which does its own internal
# routing for /, /api, /ws, /jupyter, ...).

# WebSocket upgrade map (kernels, terminals, jupyter, next HMR)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# HTTP -> HTTPS
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name _;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    client_max_body_size 100M;

    # --- Vouch: internal validation endpoint ---
    location = /validate {
        internal;
        proxy_pass http://vouch:9090/validate;
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- Vouch: login / logout / OIDC callback ---
    location /auth {
        proxy_pass http://vouch:9090/auth;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /login {
        proxy_pass http://vouch:9090/login;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
    location /logout {
        proxy_pass http://vouch:9090/logout;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Unauthenticated -> bounce to CILogon login, return to original URL after
    error_page 401 = @error401;
    location @error401 {
        return 302 https://$http_host/login?url=https://$http_host$request_uri;
    }

    # --- Everything else: require a valid session, then proxy to the studio ---
    location / {
        auth_request /validate;

        proxy_pass http://studio:80;
        proxy_http_version 1.1;

        # Preserve WebSockets (jupyter kernels/terminals, studio /ws) and SSE
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
