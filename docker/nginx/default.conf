upstream studio_api {
    server 127.0.0.1:8080;
}

upstream studio_web {
    server 127.0.0.1:3000;
}

# WebSocket upgrade map
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 100M;

    # --- Frontend (Next.js) ---
    location / {
        proxy_pass http://studio_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js HMR WebSocket (dev only)
    location /_next/webpack-hmr {
        proxy_pass http://studio_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }

    # --- Backend API ---
    location /api/ {
        proxy_pass http://studio_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE support
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # --- WebSocket terminals ---
    location /ws/ {
        proxy_pass http://studio_api/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # --- JupyterLab (on-demand, port 8889) ---
    # WebSocket upgrade headers are set on the MAIN /jupyter/ location so that
    # ALL Jupyter websockets work — not just kernels/terminals, but also
    # jupyter-ai chat (/jupyter/api/ai/...) and jupyter-collaboration RTC/yjs
    # (/jupyter/api/collaboration/...). The $connection_upgrade map keeps plain
    # HTTP requests working (Connection: close when there's no Upgrade header).
    # Without this, those sockets silently fail and JupyterLab shows
    # "Unable to reconnect to the server".
    location /jupyter/ {
        proxy_pass http://127.0.0.1:8889/jupyter/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
